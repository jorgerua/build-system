# GitHub App credentials secret.
# Create with:
#   kubectl create secret generic github-app-credentials \
#     --from-literal=app-id="<your-app-id>" \
#     --from-literal=webhook-secret="<your-webhook-secret>" \
#     --from-file=private-key.pem="<path-to-private-key.pem>"
apiVersion: v1
kind: Secret
metadata:
  name: github-app-credentials
type: Opaque
data:
  app-id: ""             # base64-encoded GitHub App ID
  webhook-secret: ""     # base64-encoded webhook secret
  private-key.pem: ""   # base64-encoded RSA private key PEM
---
# Container registry credentials.
# Create with:
#   kubectl create secret generic registry-credentials \
#     --from-file=config.json="<path-to-docker-config.json>"
# The config.json is the standard Docker credentials file used by buildah --authfile.
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
type: Opaque
data:
  config.json: ""        # base64-encoded Docker credentials JSON
